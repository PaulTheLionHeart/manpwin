<!DOCTYPE html>
<html>
<head>
<title>Edit Menu</title>

<style>
body {
    background-color: #0a0a0a;
    color: #e0e0e0;
    font-family: Arial, sans-serif;
    line-height: 1.6;
    margin: 20px;
}

h1 { color: #ffd700; }
h2 { color: #4fd1ff; }
h3 { color: #88ff66; }

code {
    background-color: #111;
    padding: 4px 6px;
    border-radius: 4px;
}

pre {
    background-color: #111;
    padding: 10px;
    border-radius: 5px;
}

table {
    margin-top: 10px;
    border-collapse: collapse;
}

td {
    padding: 6px 14px 6px 0;
    vertical-align: top;
    font-size: 1.05em;
}

td:empty + td {
    font-size: 1.05em;
    color: #cccccc;
}

code.token {
    background-color: #1a1a1a;
    color: #67ff00;
    padding: 4px 8px;
    border-radius: 5px;
    font-weight: bold;
    font-size: 1.2em;
    letter-spacing: 0.5px;
}

td:first-child + td {
    font-weight: 600;
    color: #ffffff;
}

td:empty + td {
    font-weight: normal;
    color: #bbbb55;
    font-size: 1.0em;
}

code.token:hover {
    background-color: #222;
    color: #ffdd55;
}

footer {
    margin-top: 10px;
    font-size: 0.9em;
    color: #888888;
}
</style>

</head>

<h1>Edit Menu</h1>

<h2>Edit Operations</h2>

<table>

<tr><td><code class="token">Ctrl+C</code></td><td>Copy image to clipboard</td></tr>

<tr><td><code class="token">Ctrl+Z</code></td><td>Undo</td></tr>

<tr><td><code class="token">Ctrl+Y</code></td><td>Redo</td></tr>

</table>
<hr>
<footer>
    ManpWIN Help &copy; March 2026
</footer>

</body>
</html>
